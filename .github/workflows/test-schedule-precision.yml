name: ⏰ 定时精度测试

on:
  # 定时触发：北京时间 17:50 和 18:00 各跑一次
  # 换算成 UTC 时间：17:50 - 8 = 09:50，18:00 - 8 = 10:00
  schedule:
    - cron: '50 9 * * *'   # 北京时间 17:50 (UTC 09:50)
    - cron: '0 10 * * *'   # 北京时间 18:00 (UTC 10:00)
    
  # 也支持手动触发，方便立即测试
  workflow_dispatch:

jobs:
  test-precision:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 运行时间测试脚本
        run: |
          cd MagicSTG/update
          python test_time.py

      - name: 额外的时间记录（备用）
        run: |
          echo "========================================"
          echo "工作流实际触发时间 (UTC):"
          date -u "+%Y-%m-%d %H:%M:%S"
          echo "工作流实际触发时间 (北京时间):"
          TZ='Asia/Shanghai' date "+%Y-%m-%d %H:%M:%S"
          echo "========================================"
          echo "设定的触发时间 (北京时间): 17:50 和 18:00"
          echo "如果上面显示的时间接近 17:50/18:00，说明准时"
          echo "如果相差很大，说明 GitHub Actions 有延迟"
          echo "========================================"

      - name: 上传测试结果
        uses: actions/upload-artifact@v4
        with:
          name: test-time-result-${{ github.run_id }}
          path: MagicSTG/update/test_time_result.txt
          retention-days: 7
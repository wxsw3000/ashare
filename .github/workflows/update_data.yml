name: Daily Data Update

on:
  schedule:
    # UTC 10:30 = 北京时间 18:30（A股已收盘，数据已更新）
    - cron: '30 10 * * 1-5'   # 仅工作日（周一至周五）
  workflow_dispatch:           # 保留手动触发用于调试

jobs:
  update-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run data update script
        env:
          DB_HOST: ${{ secrets.TIDB_HOST }}
          DB_PORT: ${{ secrets.TIDB_PORT }}
          DB_USER: ${{ secrets.TIDB_USER }}
          DB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
          DB_NAME: ${{ secrets.TIDB_DB_NAME }}
          GITHUB_ACTIONS: true
        run: |
          cd MagicSTG/update
          python update_data.py
          echo "✅ 数据更新完成，北京时间: $(TZ='Asia/Shanghai' date)"
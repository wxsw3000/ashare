name: 数据更新

on:
  workflow_dispatch:
    inputs:
      force:
        description: '强制重新执行所有脚本（忽略今日已完成标记）'
        required: false
        type: boolean
        default: false
      reset:
        description: '重置今日任务状态'
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types:
      - update-data

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
      
      - name: 运行更新（智能判断）
        working-directory: MagicSTG/update
        env:
          DB_HOST: ${{ secrets.TIDB_HOST }}
          DB_PORT: ${{ secrets.TIDB_PORT }}
          DB_USER: ${{ secrets.TIDB_USER }}
          DB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
          DB_NAME: ${{ secrets.TIDB_DB_NAME }}
          DB_SSL_CA: ${{ secrets.TIDB_SSL_CA }}
          MAX_RUNTIME: 19000
        run: |
          CMD_ARGS=""
          if [ "${{ inputs.force }}" = "true" ]; then CMD_ARGS="$CMD_ARGS --force"; fi
          if [ "${{ inputs.reset }}" = "true" ]; then CMD_ARGS="$CMD_ARGS --reset"; fi
          python run_all_updates.py $CMD_ARGS
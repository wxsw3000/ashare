name: 数据更新

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - update-data

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install baostock pandas pymysql python-dotenv
      
      - name: 运行更新
        working-directory: MagicSTG/update
        env:
          DB_HOST: ${{ secrets.TIDB_HOST }}
          DB_PORT: ${{ secrets.TIDB_PORT }}
          DB_USER: ${{ secrets.TIDB_USER }}
          DB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
          DB_NAME: ${{ secrets.TIDB_DB_NAME }}
          DB_SSL_CA: ${{ secrets.TIDB_SSL_CA }}
        run: |
          python run_all_updates.py